<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* Search */
        .search-box {
            position: relative;
            margin-bottom: 24px;
        }

        .search-input {
            width: 100%;
            padding: 16px 48px 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent);
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .search-btn:hover {
            opacity: 0.9;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Weather Card */
        .weather-card {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            backdrop-filter: blur(10px);
            display: none;
        }

        .weather-card.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .location {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .date {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .main-temp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .temp-icon {
            width: 80px;
            height: 80px;
        }

        .temp-value {
            font-size: 72px;
            font-weight: 300;
            line-height: 1;
        }

        .temp-unit {
            font-size: 32px;
            color: var(--text-secondary);
            align-self: flex-start;
            margin-top: 8px;
        }

        .condition {
            text-align: center;
            font-size: 18px;
            color: var(--text-secondary);
            text-transform: capitalize;
            margin-bottom: 32px;
        }

        /* Details Grid */
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .detail-item {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 18px;
            font-weight: 600;
        }

        /* Forecast */
        .forecast-title {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .forecast-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .forecast-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            min-width: 80px;
            text-align: center;
        }

        .forecast-day {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .forecast-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 8px;
        }

        .forecast-temp {
            font-size: 16px;
            font-weight: 600;
        }

        /* Error */
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .error.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Search -->
        <div class="search-box">
            <input type="text" class="search-input" id="cityInput" placeholder="Search city..." value="London">
            <button class="search-btn" onclick="searchWeather()">Search</button>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Error -->
        <div class="error" id="error">
            <p id="errorText">City not found</p>
        </div>

        <!-- Weather Card -->
        <div class="weather-card" id="weatherCard">
            <div class="location" id="location">London</div>
            <div class="date" id="date">Monday, 12 Oct</div>

            <div class="main-temp">
                <img src="" alt="Weather" class="temp-icon" id="weatherIcon">
                <span class="temp-value" id="temperature">18</span>
                <span class="temp-unit">°</span>
            </div>

            <div class="condition" id="condition">Clear sky</div>

            <div class="details">
                <div class="detail-item">
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value" id="feelsLike">16°</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidity">65%</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Wind</div>
                    <div class="detail-value" id="wind">12 km/h</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value" id="pressure">1015 hPa</div>
                </div>
            </div>

            <div class="forecast-title">5-Day Forecast</div>
            <div class="forecast-list" id="forecastList">
                <!-- Forecast items inserted here -->
            </div>
        </div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR ACTUAL API KEY
        const API_KEY = '86cfbda5a071eecbce839e11aa329e47';

        const API_URL = 'https://api.openweathermap.org/data/2.5';

        // Weather icon mapping
        function getIconUrl(iconCode) {
            return `https://openweathermap.org/img/wn/${iconCode}@4x.png`;
        }

        // Format date
        function formatDate(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString('en-US', {
                weekday: 'long',
                day: 'numeric',
                month: 'short'
            });
        }

        // Format day name
        function formatDay(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString('en-US', { weekday: 'short' });
        }

        // Show loading
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('weatherCard').classList.remove('active');
            document.getElementById('error').classList.remove('active');
        }

        // Show error
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorText').textContent = message;
            document.getElementById('error').classList.add('active');
        }

        // Show weather
        function showWeather() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('weatherCard').classList.add('active');
            document.getElementById('error').classList.remove('active');
        }

        // Fetch weather data
        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();

            if (!city) return;

            showLoading();

            try {
                // Current weather
                const currentResponse = await fetch(
                    `${API_URL}/weather?q=${city}&appid=${API_KEY}&units=metric`
                );

                if (!currentResponse.ok) throw new Error('City not found');

                const currentData = await currentResponse.json();

                // Forecast
                const forecastResponse = await fetch(
                    `${API_URL}/forecast?q=${city}&appid=${API_KEY}&units=metric`
                );

                const forecastData = await forecastResponse.json();

                // Update UI
                updateCurrentWeather(currentData);
                updateForecast(forecastData);
                showWeather();

            } catch (error) {
                showError(error.message || 'Failed to fetch weather data');
            }
        }

        // Update current weather display
        function updateCurrentWeather(data) {
            document.getElementById('location').textContent = `${data.name}, ${data.sys.country}`;
            document.getElementById('date').textContent = formatDate(data.dt);
            document.getElementById('temperature').textContent = Math.round(data.main.temp);
            document.getElementById('condition').textContent = data.weather[0].description;
            document.getElementById('weatherIcon').src = getIconUrl(data.weather[0].icon);

            document.getElementById('feelsLike').textContent = `${Math.round(data.main.feels_like)}°`;
            document.getElementById('humidity').textContent = `${data.main.humidity}%`;
            document.getElementById('wind').textContent = `${Math.round(data.main.wind.speed * 3.6)} km/h`;
            document.getElementById('pressure').textContent = `${data.main.pressure} hPa`;
        }

        // Update forecast display
        function updateForecast(data) {
            const forecastList = document.getElementById('forecastList');
            forecastList.innerHTML = '';

            // Get one forecast per day (noon time)
            const dailyData = data.list.filter(item => item.dt_txt.includes('12:00:00')).slice(0, 5);

            dailyData.forEach(day => {
                const item = document.createElement('div');
                item.className = 'forecast-item';
                item.innerHTML = `
                    <div class="forecast-day">${formatDay(day.dt)}</div>
                    <img src="${getIconUrl(day.weather[0].icon)}" alt="" class="forecast-icon">
                    <div class="forecast-temp">${Math.round(day.main.temp)}°</div>
                `;
                forecastList.appendChild(item);
            });
        }

        // Search on Enter key
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchWeather();
        });

        // Load default city on page load
        window.onload = () => searchWeather();
    </script>
</body>

</html>
